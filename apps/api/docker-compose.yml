version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${EDUNEXA_CONTAINER_NAME:-edunexa-api}
    restart: unless-stopped
    ports:
      - "${EDUNEXA_HOST_PORT:-33001}:33001"
    volumes:
      - "${EDUNEXA_DATA_DIR:-./data}:/app/data"
      - "${EDUNEXA_LOG_DIR:-./log}:/app/log"
      - "${EDUNEXA_CONFIG_DIR:-./config}:/app/config:ro"
    environment:
      - TZ=Asia/Shanghai
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
