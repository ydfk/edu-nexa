kind: pipeline
type: docker
name: admin-ci

clone:
  retries: 3

steps:
  - name: verify-admin
    image: node:22.14.0-bullseye
    commands:
      - corepack enable
      - pnpm config set registry https://registry.npmmirror.com
      - pnpm install --frozen-lockfile
      - pnpm lint:admin
      - pnpm build:admin

trigger:
  event:
    - push
    - pull_request

