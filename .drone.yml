    - pull_request

---
kind: pipeline
type: docker
name: admin-release

clone:
  disable: true

steps:
  - name: clone-repository
    image: alpine/git
    commands:
      - git clone https://gh.ydfkvps.site/https://github.com/ydfk/edu-nexa .
      - git checkout "$DRONE_COMMIT_SHA"

  - name: verify-admin-release
    image: node:22.14.0-bullseye
    commands:
      - corepack enable
      - pnpm config set registry https://registry.npmmirror.com
      - pnpm install --frozen-lockfile
      - export SHORT_SHA="$(printf '%.7s' "$DRONE_COMMIT_SHA")"
      - if [ -n "${DRONE_TAG:-}" ]; then export APP_VERSION="$DRONE_TAG"; elif [ -n "${DRONE_BUILD_NUMBER:-}" ]; then export APP_VERSION="build-${DRONE_BUILD_NUMBER}-${SHORT_SHA}"; else export APP_VERSION="$SHORT_SHA"; fi
      - APP_VERSION="$APP_VERSION" pnpm build:admin
      - tar -C apps/admin/dist -czf admin-dist.tar.gz .

  - name: upload-admin
    image: appleboy/drone-scp
    settings:
      host:
        from_secret: deploy_host
      port:
        from_secret: deploy_port
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_key
      command_timeout: 20m
      overwrite: true
      source: admin-dist.tar.gz
      target: /tmp/edunexa-admin

  - name: deploy-admin
    image: appleboy/drone-ssh
    environment:
      ADMIN_WEB_ROOT:
        from_secret: admin_web_root
    settings:
      host:
        from_secret: deploy_host
      port:
        from_secret: deploy_port
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_key
      command_timeout: 20m
      envs:
        - DRONE_COMMIT_SHA
        - DRONE_BUILD_NUMBER
        - DRONE_TAG
        - ADMIN_WEB_ROOT
      script: |
        set -e
        test -f /tmp/edunexa-admin/admin-dist.tar.gz || { echo "未找到上传包: /tmp/edunexa-admin/admin-dist.tar.gz"; ls -la /tmp/edunexa-admin; exit 1; }
        case "$ADMIN_WEB_ROOT" in ""|"/") echo "ADMIN_WEB_ROOT 配置不安全"; exit 1;; esac
        export ADMIN_DEPLOY_TMP="/tmp/edunexa-admin-extract-${DRONE_BUILD_NUMBER:-manual}"
        rm -rf "$ADMIN_DEPLOY_TMP"
        mkdir -p "$ADMIN_DEPLOY_TMP" "$ADMIN_WEB_ROOT"
        tar -xzf /tmp/edunexa-admin/admin-dist.tar.gz -C "$ADMIN_DEPLOY_TMP"
        test -w "$ADMIN_WEB_ROOT" || { echo "ADMIN_WEB_ROOT 不可写: $ADMIN_WEB_ROOT"; ls -ld "$ADMIN_WEB_ROOT"; exit 1; }
        find "$ADMIN_WEB_ROOT" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
        cp -R "$ADMIN_DEPLOY_TMP"/. "$ADMIN_WEB_ROOT"/
        rm -f /tmp/edunexa-admin/admin-dist.tar.gz
        rm -rf "$ADMIN_DEPLOY_TMP"

trigger:
  event:
    - promote
  target:
    - admin-production
    - full-production

---
kind: pipeline
type: docker
name: api-release

clone:
  disable: true

steps:
  - name: clone-repository
    image: alpine/git
    commands:
      - git clone https://gh.ydfkvps.site/https://github.com/ydfk/edu-nexa .
      - git checkout "$DRONE_COMMIT_SHA"

  - name: verify-api-release
    image: golang:1.24
    commands:
      - go env -w GOPROXY=https://goproxy.cn,direct
      - go env -w GOSUMDB=sum.golang.google.cn
      - cd apps/api
      - go build -o ./tmp/api-dev.exe ./cmd
      - cd ../..
      - tar -C apps/api -czf api-source.tar.gz .

  - name: upload-api
    image: appleboy/drone-scp
    settings:
      host:
        from_secret: deploy_host
      port:
        from_secret: deploy_port
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_key
      command_timeout: 20m
      overwrite: true
      source: api-source.tar.gz
      target: /tmp/edunexa-api

  - name: deploy-api
    image: appleboy/drone-ssh
    environment:
      API_COMPOSE_FILE:
        from_secret: api_compose_file
      API_SOURCE_DIR:
        from_secret: api_source_dir
    settings:
      host:
        from_secret: deploy_host
      port:
        from_secret: deploy_port
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_key
      command_timeout: 20m
      envs:
        - DRONE_COMMIT_SHA
        - DRONE_BUILD_NUMBER
        - DRONE_TAG
        - API_COMPOSE_FILE
        - API_SOURCE_DIR
      script: |
        set -e
        export SHORT_SHA="$(printf '%.7s' "$DRONE_COMMIT_SHA")"
        if [ -n "${DRONE_TAG:-}" ]; then export APP_VERSION="$DRONE_TAG"; elif [ -n "${DRONE_BUILD_NUMBER:-}" ]; then export APP_VERSION="build-${DRONE_BUILD_NUMBER}-${SHORT_SHA}"; else export APP_VERSION="$SHORT_SHA"; fi
        test -f /tmp/edunexa-api/api-source.tar.gz || { echo "未找到上传包: /tmp/edunexa-api/api-source.tar.gz"; ls -la /tmp/edunexa-api; exit 1; }
        case "$API_SOURCE_DIR" in ""|"/") echo "API_SOURCE_DIR 配置不安全"; exit 1;; esac
        test -f "$API_COMPOSE_FILE" || { echo "未找到 compose 文件: $API_COMPOSE_FILE"; exit 1; }
        export API_DEPLOY_TMP="/tmp/edunexa-api-extract-${DRONE_BUILD_NUMBER:-manual}"
        rm -rf "$API_DEPLOY_TMP"
        mkdir -p "$API_DEPLOY_TMP" "$API_SOURCE_DIR"
        tar -xzf /tmp/edunexa-api/api-source.tar.gz -C "$API_DEPLOY_TMP"
        test -w "$API_SOURCE_DIR" || { echo "API_SOURCE_DIR 不可写: $API_SOURCE_DIR"; ls -ld "$API_SOURCE_DIR"; exit 1; }
        find "$API_SOURCE_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
        cp -R "$API_DEPLOY_TMP"/. "$API_SOURCE_DIR"/
        rm -f /tmp/edunexa-api/api-source.tar.gz
        rm -rf "$API_DEPLOY_TMP"
        APP_VERSION="$APP_VERSION" docker compose -f "$API_COMPOSE_FILE" up -d --build

trigger:
  event:
    - promote
  target:
    - api-production
    - full-production
