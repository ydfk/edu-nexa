---
kind: pipeline
type: docker
name: api-ci

clone:
  retries: 3

steps:
  - name: verify-api
    image: golang:1.24
    commands:
      - go env -w GOPROXY=https://goproxy.cn,direct
      - go env -w GOSUMDB=sum.golang.google.cn
      - cd apps/api
      - go build -o ./tmp/api-dev.exe ./cmd

trigger:
  event:
    - push
    - pull_request

---
kind: pipeline
type: docker
name: admin-release

clone:
  retries: 3

steps:
  - name: verify-admin-release
    image: node:22.14.0-bullseye
    commands:
      - corepack enable
      - pnpm config set registry https://registry.npmmirror.com
      - pnpm install --frozen-lockfile
      - export SHORT_SHA="$(printf '%.7s' "$DRONE_COMMIT_SHA")"
      - if [ -n "${DRONE_TAG:-}" ]; then export APP_VERSION="$DRONE_TAG"; elif [ -n "${DRONE_BUILD_NUMBER:-}" ]; then export APP_VERSION="build-${DRONE_BUILD_NUMBER}-${SHORT_SHA}"; else export APP_VERSION="$SHORT_SHA"; fi
      - APP_VERSION="$APP_VERSION" pnpm build:admin
      - mkdir -p .drone-dist
      - tar -C apps/admin/dist -czf .drone-dist/admin-dist.tar.gz .

  - name: upload-admin
    image: appleboy/drone-scp
    settings:
      host:
        from_secret: deploy_host
      port:
        from_secret: deploy_port
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_key
      command_timeout: 20
      source: .drone-dist/admin-dist.tar.gz
      target: /tmp/edunexa-admin

  - name: deploy-admin
    image: appleboy/drone-ssh
    environment:
      ADMIN_WEB_ROOT:
        from_secret: admin_web_root
    settings:
      host:
        from_secret: deploy_host
      port:
        from_secret: deploy_port
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_key
      command_timeout: 20m
      envs:
        - DRONE_COMMIT_SHA
        - DRONE_BUILD_NUMBER
        - DRONE_TAG
        - ADMIN_WEB_ROOT
      script:
        - mkdir -p "$ADMIN_WEB_ROOT"
        - find "$ADMIN_WEB_ROOT" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
        - tar -xzf /tmp/edunexa-admin/admin-dist.tar.gz -C "$ADMIN_WEB_ROOT"
        - rm -f /tmp/edunexa-admin/admin-dist.tar.gz

trigger:
  event:
    - promote
  target:
    - admin-production
    - full-production

---
kind: pipeline
type: docker
name: api-release

clone:
  retries: 3

steps:
  - name: verify-api-release
    image: golang:1.24
    commands:
      - go env -w GOPROXY=https://goproxy.cn,direct
      - go env -w GOSUMDB=sum.golang.google.cn
      - cd apps/api
      - go build -o ./tmp/api-dev.exe ./cmd
      - cd ../..
      - mkdir -p .drone-dist
      - tar -C apps/api -czf .drone-dist/api-source.tar.gz .

  - name: upload-api
    image: appleboy/drone-scp
    settings:
      host:
        from_secret: deploy_host
      port:
        from_secret: deploy_port
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_key
      command_timeout: 20
      source: .drone-dist/api-source.tar.gz
      target: /tmp/edunexa-api

  - name: deploy-api
    image: appleboy/drone-ssh
    environment:
      API_COMPOSE_FILE:
        from_secret: api_compose_file
      API_SOURCE_DIR:
        from_secret: api_source_dir
    settings:
      host:
        from_secret: deploy_host
      port:
        from_secret: deploy_port
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_key
      command_timeout: 20m
      envs:
        - DRONE_COMMIT_SHA
        - DRONE_BUILD_NUMBER
        - DRONE_TAG
        - API_COMPOSE_FILE
        - API_SOURCE_DIR
      script:
        - export SHORT_SHA="$(printf '%.7s' "$DRONE_COMMIT_SHA")"
        - if [ -n "${DRONE_TAG:-}" ]; then export APP_VERSION="$DRONE_TAG"; elif [ -n "${DRONE_BUILD_NUMBER:-}" ]; then export APP_VERSION="build-${DRONE_BUILD_NUMBER}-${SHORT_SHA}"; else export APP_VERSION="$SHORT_SHA"; fi
        - mkdir -p "$API_SOURCE_DIR"
        - find "$API_SOURCE_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
        - tar -xzf /tmp/edunexa-api/api-source.tar.gz -C "$API_SOURCE_DIR"
        - rm -f /tmp/edunexa-api/api-source.tar.gz
        - APP_VERSION="$APP_VERSION" docker compose -f "$API_COMPOSE_FILE" up -d --build

trigger:
  event:
    - promote
  target:
    - api-production
    - full-production
