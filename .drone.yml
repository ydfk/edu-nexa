kind: pipeline
type: docker
name: admin-ci

clone:
  disable: true

steps:
  - name: clone-repository
    image: alpine/git
    commands:
      - git clone https://gh.ydfkvps.site/https://github.com/ydfk/edu-nexa .
      - git checkout "$DRONE_COMMIT_SHA"

  - name: verify-admin
    image: node:22.14.0-bullseye
    commands:
      - corepack enable
      - pnpm config set registry https://registry.npmmirror.com
      - pnpm install --frozen-lockfile
      - pnpm lint:admin
      - pnpm build:admin

trigger:
  event:
    - push
    - pull_request

