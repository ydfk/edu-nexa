version: "3.8"

services:
  api:
    image: ${API_IMAGE_REPOSITORY:-hub.ydfk.site/edu-nexa/api}:${APP_VERSION:-latest}
    container_name: ${EDUNEXA_API_CONTAINER_NAME:-edunexa-api}
    restart: unless-stopped
    ports:
      - "${EDUNEXA_API_PORT:-33001}:33001"
    environment:
      APP_VERSION: ${APP_VERSION:-latest}
      TZ: Asia/Shanghai
    volumes:
      - "${EDUNEXA_CONFIG_DIR:-./deploy/config}:/app/config:ro"
      - "${EDUNEXA_DATA_DIR:-./deploy/data}:/app/data"
      - "${EDUNEXA_LOG_DIR:-./deploy/log}:/app/log"
